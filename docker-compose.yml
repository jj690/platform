name: platform

# Reusable configuration blocks
x-service-defaults: &service-defaults
  restart: unless-stopped

x-traefik-labels: &traefik-labels
  traefik.enable: "true"
  traefik.docker.network: "${PROXY_NETWORK}"

x-healthcheck-defaults: &healthcheck-defaults
  interval: ${HEALTHCHECK_INTERVAL}
  timeout: ${HEALTHCHECK_TIMEOUT}
  retries: ${HEALTHCHECK_RETRIES}


services:
  traefik:
    <<: *service-defaults

    image: ${TRAEFIK_IMAGE}

    command:
      - "--api=true"
      - "--api.basepath=${TRAEFIK_PATH}"

      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${PROXY_NETWORK}"

      - "--entrypoints.web.address=:${TRAEFIK_WEB_PORT}"
      - "--entrypoints.health.address=:${TRAEFIK_HEALTH_PORT}"

      - "--ping=true"
      - "--ping.entrypoint=health"

    ports:
      - "${PLATFORM_HTTP_PORT}:${TRAEFIK_WEB_PORT}"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    labels:
      <<: *traefik-labels

      traefik.http.routers.traefik.rule: >-
        Path(`${TRAEFIK_PATH}`) ||
        PathPrefix(`${TRAEFIK_PATH}/`)
      traefik.http.routers.traefik.entrypoints: web
      traefik.http.routers.traefik.service: api@internal
      traefik.http.routers.traefik.priority: "${PRIORITY_TRAEFIK}"

    networks:
      - proxy


  n8n:
    <<: *service-defaults

    image: ${N8N_IMAGE}

    environment:
      GENERIC_TIMEZONE: ${TIMEZONE}
      TZ: ${TIMEZONE}

      N8N_SECURE_COOKIE: "false"
      N8N_HOST: ${PLATFORM_HOST}
      N8N_PROTOCOL: ${PLATFORM_PROTOCOL}
      N8N_PORT: "${N8N_PORT}"
      N8N_PATH: "${N8N_PATH}/"
      N8N_PROXY_HOPS: "1"

      WEBHOOK_URL: >-
        ${PLATFORM_PROTOCOL}://${PLATFORM_HOST}${N8N_PATH}/
      N8N_EDITOR_BASE_URL: >-
        ${PLATFORM_PROTOCOL}://${PLATFORM_HOST}${N8N_PATH}/

    volumes:
      - n8n_data:/home/node/.n8n

    depends_on:
      at-backend:
        condition: service_healthy

    labels:
      <<: *traefik-labels

      traefik.http.routers.n8n.rule: >-
        Path(`${N8N_PATH}`) ||
        PathPrefix(`${N8N_PATH}/`)
      traefik.http.routers.n8n.entrypoints: web
      traefik.http.routers.n8n.priority: "${PRIORITY_DEFAULT}"

      traefik.http.routers.n8n.middlewares: n8n-strip
      traefik.http.middlewares.n8n-strip.stripprefix.prefixes: "${N8N_PATH}"

      traefik.http.services.n8n.loadbalancer.server.port: "${N8N_PORT}"

    networks:
      - proxy


  healthcheck:
    <<: *service-defaults

    build:
      context: ./infra/healthcheck/backend

    environment:
      N8N_HEALTH_URL: >-
        http://n8n:${N8N_PORT}/healthz/readiness
      TRACKER_API_HEALTH_URL: >-
        http://at-backend:${TRACKER_API_PORT}/health
      ADMINER_HEALTH_URL: http://adminer:8080/
      TRAEFIK_HEALTH_URL: >-
        http://traefik:${TRAEFIK_HEALTH_PORT}/ping

    depends_on:
      traefik:
        condition: service_started

    labels:
      <<: *traefik-labels

      traefik.http.routers.healthcheck.rule: >-
        Path(`${HEALTH_PATH}`) ||
        PathPrefix(`${HEALTH_PATH}/`)
      traefik.http.routers.healthcheck.entrypoints: web
      traefik.http.routers.healthcheck.priority: "${PRIORITY_HEALTH}"

      traefik.http.services.healthcheck.loadbalancer.server.port: "8000"

    networks:
      - proxy


  at-backend:
    <<: *service-defaults

    build:
      context: ./apps/application-tracker/backend

    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: >-
        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB_APPLICATION_TRACKER}

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./apps/application-tracker/backend/app:/app/app

    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "${TRACKER_API_PORT}"
      - --reload
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"
      - --root-path
      - "${TRACKER_API_PATH}"

    healthcheck:
      <<: *healthcheck-defaults

      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen(
          'http://localhost:${TRACKER_API_PORT}/health'
          )

      start_period: 10s

    labels:
      <<: *traefik-labels

      traefik.http.routers.at-backend.rule: >-
        Path(`${TRACKER_API_PATH}`) ||
        PathPrefix(`${TRACKER_API_PATH}/`)
      traefik.http.routers.at-backend.entrypoints: web
      traefik.http.routers.at-backend.priority: "${PRIORITY_API}"

      traefik.http.routers.at-backend.middlewares: at-backend-strip
      traefik.http.middlewares.at-backend-strip.stripprefix.prefixes: "${TRACKER_API_PATH}"

      traefik.http.services.at-backend.loadbalancer.server.port: "${TRACKER_API_PORT}"

    networks:
      - proxy
      - database


  at-frontend:
    <<: *service-defaults

    build:
      context: ./apps/application-tracker/frontend

    entrypoint:
      - streamlit
      - run

    command:
      - /app/main.py
      - --server.address=0.0.0.0
      - "--server.port=${TRACKER_FRONTEND_PORT}"
      - --server.headless=true
      - "--server.baseUrlPath=${STREAMLIT_BASE_PATH}"
      - "--browser.serverAddress=${PLATFORM_HOST}"
      - "--browser.serverPort=${PLATFORM_HTTP_PORT}"

    environment:
      API_URL: http://at-backend:${TRACKER_API_PORT}

    volumes:
      - ./apps/application-tracker/frontend/src:/app

    depends_on:
      at-backend:
        condition: service_healthy

    healthcheck:
      <<: *healthcheck-defaults

      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen(
          'http://localhost:${TRACKER_FRONTEND_PORT}${TRACKER_PATH}/_stcore/health'
          )

      start_period: 15s

    labels:
      <<: *traefik-labels

      traefik.http.routers.at-frontend.rule: >-
        Path(`${TRACKER_PATH}`) ||
        PathPrefix(`${TRACKER_PATH}/`)
      traefik.http.routers.at-frontend.entrypoints: web
      traefik.http.routers.at-frontend.priority: "${PRIORITY_DEFAULT}"

      traefik.http.services.at-frontend.loadbalancer.server.port: "${TRACKER_FRONTEND_PORT}"

    networks:
      - proxy


  postgres:
    <<: *service-defaults

    image: ${POSTGRES_IMAGE}

    environment:
      POSTGRES_DB: ${POSTGRES_DB_APPLICATION_TRACKER}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      <<: *healthcheck-defaults

      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}

      start_period: 10s

    networks:
      - database


  portal:
    <<: *service-defaults

    build:
      context: ./apps/portal/frontend

    environment:
      PLATFORM_PROTOCOL: ${PLATFORM_PROTOCOL}
      PLATFORM_HOST: ${PLATFORM_HOST}

      PORTAL_PATH: ${PORTAL_PATH}
      N8N_PATH: ${N8N_PATH}
      TRACKER_PATH: ${TRACKER_PATH}
      TRACKER_API_PATH: ${TRACKER_API_PATH}
      ADMINER_PATH: ${ADMINER_PATH}
      TRAEFIK_PATH: ${TRAEFIK_PATH}

    labels:
      <<: *traefik-labels

      # PathPrefix("/") already matches the root and every other path.
      traefik.http.routers.portal.rule: "PathPrefix(`/`)"
      traefik.http.routers.portal.entrypoints: web
      traefik.http.routers.portal.priority: "${PRIORITY_PORTAL}"

      traefik.http.services.portal.loadbalancer.server.port: "80"

    networks:
      - proxy


  adminer:
    <<: *service-defaults

    image: ${ADMINER_IMAGE}

    environment:
      ADMINER_DEFAULT_SERVER: postgres

    depends_on:
      postgres:
        condition: service_healthy

    labels:
      <<: *traefik-labels

      traefik.http.routers.adminer.rule: >-
        Path(`${ADMINER_PATH}`) ||
        PathPrefix(`${ADMINER_PATH}/`)
      traefik.http.routers.adminer.entrypoints: web
      traefik.http.routers.adminer.priority: "${PRIORITY_DEFAULT}"

      traefik.http.routers.adminer.middlewares: >-
        adminer-redirect,adminer-strip

      traefik.http.middlewares.adminer-redirect.redirectregex.regex: >-
        ^(https?://[^/]+${ADMINER_PATH})$
      traefik.http.middlewares.adminer-redirect.redirectregex.replacement: "$${1}/"
      traefik.http.middlewares.adminer-redirect.redirectregex.permanent: "true"

      traefik.http.middlewares.adminer-strip.stripprefix.prefixes: "${ADMINER_PATH}"

      traefik.http.services.adminer.loadbalancer.server.port: "8080"

    networks:
      - proxy
      - database


volumes:
  n8n_data:
  postgres_data:


networks:
  proxy:
    name: ${PROXY_NETWORK}

  database:
    name: ${DATABASE_NETWORK}
